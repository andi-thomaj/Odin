name: Backend tests

on:
  pull_request:
  push:
    branches: [master, development]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    name: Odin.Api.Tests (unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Odin.slnx

      - name: Build
        run: dotnet build Odin.slnx --configuration Release --no-restore

      - name: Run unit tests
        run: |
          dotnet test Odin.Api.Tests/Odin.Api.Tests.csproj \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=unit-tests.trx" \
            --logger "console;verbosity=normal" \
            --results-directory ./TestResults

      - name: Upload TRX results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: TestResults/*.trx
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 14

  integration-tests:
    name: Odin.Api.IntegrationTests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Show Docker version (Testcontainers prereq)
        run: docker version

      - name: Restore
        run: dotnet restore Odin.slnx

      - name: Build
        run: dotnet build Odin.slnx --configuration Release --no-restore

      - name: Run integration tests
        # No ConnectionStrings__DefaultConnection env var. Setting it to "" overrides
        # appsettings.Testing.json's "<secret>" placeholder with an empty string, and
        # Program.cs's AddNpgSql(...) rejects empty strings before the test factory's
        # InMemoryCollection override can apply. Leaving the variable unset lets the
        # placeholder satisfy AddNpgSql's guard while CustomWebApplicationFactory still
        # routes the DbContext through the Testcontainers Postgres instance.
        run: |
          dotnet test Odin.Api.IntegrationTests/Odin.Api.IntegrationTests.csproj \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=integration-tests.trx" \
            --logger "console;verbosity=normal" \
            --results-directory ./TestResults

      - name: Upload TRX results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: TestResults/*.trx
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-coverage
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 14
